1\Command="    copyq:\n    tab(config('clipboard_tab'))\n    var count = size()\n    if (count) {\n      items = Array\n        .apply(0, Array(count))\n        .map(function(x,i){return i})\n      remove.apply(this, items)\n    }\n    popup('Clipboard Tab Cleared')"
